<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download — Store</title>
    <script src="tailwind.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>body { font-family: 'DM Sans', sans-serif; }</style>

    <script>
      window.__MERCHANT_API_URL__    = 'http://localhost:8787';
      window.__MERCHANT_PUBLIC_KEY__ = 'pk_your_public_key_here';
    </script>
  </head>
  <body class="bg-zinc-950 text-white min-h-screen">

    <!-- Header -->
    <header class="border-b border-zinc-800">
      <div class="max-w-6xl mx-auto px-6 h-16 flex items-center">
        <a href="/" class="text-lg font-bold tracking-tight">STORE</a>
      </div>
    </header>

    <main class="max-w-md mx-auto px-6 py-20">

      <!-- Loading -->
      <div id="dl-loading" class="text-center">
        <div class="inline-block w-8 h-8 border-2 border-zinc-700 border-t-white rounded-full animate-spin mb-4"></div>
        <p class="text-zinc-500 text-sm">Validating your download link...</p>
      </div>

      <!-- Error state -->
      <div id="dl-error" class="text-center" style="display:none">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-red-500/10 rounded-full mb-4">
          <svg class="w-8 h-8 text-red-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
        <h1 class="text-xl font-semibold mb-2">Link unavailable</h1>
        <p data-error-message class="text-zinc-400 text-sm leading-relaxed mb-6"></p>
        <a href="/" class="text-sm text-white hover:underline">← Back to shop</a>
      </div>

      <!-- Success / download content -->
      <div id="dl-content" style="display:none">
        <div class="text-center mb-8">
          <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600/10 rounded-full mb-4">
            <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
          </div>
          <h1 class="text-2xl font-bold mb-1" id="dl-product-title">Your file</h1>
          <p id="dl-filename" class="text-zinc-500 text-sm font-mono"></p>
        </div>

        <!-- Metadata -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-4 mb-6 space-y-2 text-sm">
          <div class="flex justify-between text-zinc-400">
            <span>Downloads remaining</span>
            <span id="dl-remaining" class="text-white font-medium">—</span>
          </div>
          <div class="flex justify-between text-zinc-400">
            <span>Link expires</span>
            <span id="dl-expires" class="text-white font-medium">—</span>
          </div>
        </div>

        <!-- Download button -->
        <a
          id="dl-button"
          href="#"
          download
          class="flex items-center justify-center gap-2 w-full bg-white text-black font-semibold py-3.5 rounded-lg hover:bg-zinc-200 transition-colors text-sm"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>
          <span id="dl-button-cta">Download file</span>
        </a>

        <p class="text-center text-zinc-600 text-xs mt-4">
          Keep this link safe. It is personal and will expire after the allowed number of downloads.
        </p>
      </div>
    </main>

    <script type="module" src="/src/downloads-page.js"></script>
  </body>
</html>
