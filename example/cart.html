<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart — Store</title>
    <script src="tailwind.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>body { font-family: 'DM Sans', sans-serif; }</style>

    <script>
      window.__MERCHANT_API_URL__  = 'http://localhost:8787';
      window.__MERCHANT_PUBLIC_KEY__ = 'pk_your_public_key_here';
      window.__MERCHANT_PROVIDER__   = 'fedapay'; // or 'stripe'
	  window.__MERCHANT_CURRENCY__   = 'XOF'; // set once to match your store
    </script>
  </head>
  <body class="bg-zinc-950 text-white min-h-screen">

    <!-- Header -->
    <header class="border-b border-zinc-800 sticky top-0 z-40 bg-zinc-950/95 backdrop-blur">
      <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
        <a href="/" class="text-lg font-bold tracking-tight">STORE</a>
        <nav class="flex items-center gap-6">
          <a id="shop" href="/" class="text-sm text-zinc-400 hover:text-white transition-colors">Shop</a>
          <a href="/cart.html" class="relative p-2 bg-zinc-800 rounded-lg">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-xs font-bold w-5 h-5 rounded-full items-center justify-center" style="display:none">0</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12">
      <h1 class="text-3xl font-bold mb-8">Your Cart</h1>

      <!-- Page error -->
      <p id="page-error" class="text-red-400 text-sm mb-4" style="display:none"></p>

      <!-- Loading -->
      <div id="loading-state" class="py-20 flex items-center justify-center" style="display:none">
        <div class="w-8 h-8 border-2 border-zinc-700 border-t-white rounded-full animate-spin"></div>
      </div>

      <!-- Empty state -->
      <div id="empty-cart" class="text-center py-20" style="display:none">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-zinc-900 rounded-full mb-4">
          <svg class="w-8 h-8 text-zinc-600" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
        </div>
        <h2 class="text-xl font-medium mb-2">Your cart is empty</h2>
        <p class="text-zinc-500 mb-6 text-sm">Add some items to get started.</p>
        <a href="/" class="inline-block bg-white text-black font-medium px-6 py-3 rounded-lg hover:bg-zinc-200 transition-colors text-sm">
          Continue Shopping
        </a>
      </div>

      <!-- Cart content — two column layout on md+ -->
      <div id="cart-content" class="grid md:grid-cols-[1fr_360px] gap-10" style="display:none">

        <!-- Left: items + shipping -->
        <div>
          <!-- Line items -->
          <div id="cart-items" class="mb-8"></div>

          <!-- Shipping address — shown only when cart has physical items -->
          <div id="shipping-section" class="mb-8" style="display:none">
            <div class="border border-zinc-800 rounded-xl p-5">
              <h2 class="text-base font-semibold mb-4 flex items-center gap-2">
                <svg class="w-4 h-4 text-zinc-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M3 3h2l.4 2M7 13h10l4-8H5.4m0 0L7 13m0 0l-1.5 6M7 13l-1.5 6m0 0h9m-9 0a1.5 1.5 0 103 0m6 0a1.5 1.5 0 103 0" />
                </svg>
                Shipping address
              </h2>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div class="sm:col-span-2">
                  <label class="block text-xs text-zinc-400 mb-1">Full name *</label>
                  <input id="shipping-name" type="text" placeholder="Jane Dupont" autocomplete="name"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2.5 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-zinc-500" />
                </div>
                <div class="sm:col-span-2">
                  <label class="block text-xs text-zinc-400 mb-1">Address line 1 *</label>
                  <input id="shipping-line1" type="text" placeholder="123 Rue de la Paix" autocomplete="address-line1"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2.5 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-zinc-500" />
                </div>
                <div class="sm:col-span-2">
                  <label class="block text-xs text-zinc-400 mb-1">Address line 2</label>
                  <input id="shipping-line2" type="text" placeholder="Apt, building, etc." autocomplete="address-line2"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2.5 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-zinc-500" />
                </div>
                <div>
                  <label class="block text-xs text-zinc-400 mb-1">City *</label>
                  <input id="shipping-city" type="text" placeholder="Cotonou" autocomplete="address-level2"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2.5 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-zinc-500" />
                </div>
                <div>
                  <label class="block text-xs text-zinc-400 mb-1">State / Province</label>
                  <input id="shipping-state" type="text" placeholder="Littoral" autocomplete="address-level1"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2.5 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-zinc-500" />
                </div>
                <div>
                  <label class="block text-xs text-zinc-400 mb-1">Postal code</label>
                  <input id="shipping-postal" type="text" placeholder="01 BP 000" autocomplete="postal-code"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2.5 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-zinc-500" />
                </div>
                <div>
                  <label class="block text-xs text-zinc-400 mb-1">Country *</label>
                  <input id="shipping-country" type="text" placeholder="BJ" autocomplete="country"
                    class="w-full bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2.5 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-zinc-500" />
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: summary + checkout -->
        <div>
          <div id="cart-summary" class="border border-zinc-800 rounded-xl p-5 sticky top-24">
            <h2 class="text-base font-semibold mb-4">Order Summary</h2>

            <!-- Line totals -->
            <div class="space-y-2 text-sm mb-4">
              <div class="flex justify-between text-zinc-400">
                <span>Subtotal</span>
                <span id="subtotal">—</span>
              </div>

              <!-- Discount row — hidden until a code is applied -->
              <div id="discount-row" class="flex justify-between text-green-400" style="display:none">
                <span class="flex items-center gap-1.5">
                  <span id="applied-code" class="font-mono text-xs bg-green-400/10 px-1.5 py-0.5 rounded"></span>
                  <button id="remove-discount" class="text-zinc-500 hover:text-red-400 text-xs transition-colors">✕</button>
                </span>
                <span id="discount-amount"></span>
              </div>

              <div class="flex justify-between font-semibold text-base pt-2 border-t border-zinc-800 mt-2">
                <span>Total</span>
                <span id="total">—</span>
              </div>
            </div>

            <!-- Discount code input -->
            <div class="mb-4">
              <div class="flex gap-2">
                <input
                  id="discount-code"
                  type="text"
                  placeholder="Discount code"
                  class="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg px-3 py-2 text-white placeholder-zinc-600 text-sm focus:outline-none focus:border-zinc-500 font-mono uppercase"
                />
                <button id="apply-discount" class="px-4 py-2 text-sm font-medium bg-zinc-800 hover:bg-zinc-700 rounded-lg transition-colors text-white">
                  Apply
                </button>
              </div>
              <p id="discount-error" class="text-sm mt-1" style="display:none"></p>
            </div>

            <!-- Checkout error -->
            <p id="checkout-error" class="text-red-400 text-sm mb-3" style="display:none"></p>

            <!-- Checkout button -->
            <button
              id="checkout-btn"
              disabled
              class="w-full bg-white text-black font-semibold py-3.5 rounded-lg hover:bg-zinc-200 transition-colors disabled:opacity-40 disabled:cursor-not-allowed text-sm"
            >
              Proceed to Payment
            </button>

            <p id="provider-label" class="text-center text-zinc-600 text-xs mt-3">Secure checkout</p>

            <!-- Trust signals -->
            <div class="flex items-center justify-center gap-3 mt-4 text-zinc-700 text-xs">
              <span>🔒 SSL encrypted</span>
              <span>·</span>
              <span>FedaPay</span>
            </div>
          </div>
        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-zinc-800 mt-20">
      <div class="max-w-6xl mx-auto px-6 py-8 flex items-center justify-between text-sm text-zinc-500">
        <a href="/" class="text-white font-bold tracking-tight text-sm">STORE</a>
        <p class="text-xs">Powered by <a href="https://github.com/ygwyg/merchant" class="text-white hover:underline">Merchant</a></p>
      </div>
    </footer>

    <script type="module" src="/src/cart-page.js"></script>
  </body>
</html>
